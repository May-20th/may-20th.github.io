<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XY's Repo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background: #0a0a12;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(20, 20, 35, 0.9);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .tag {
            display: inline-block;
            background: rgba(255, 200, 0, 0.15);
            color: #ffc800;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #aaa;
            font-size: 15px;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 12px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-sileo {
            background: #007bff;
            color: white;
        }
        .btn-zebra {
            background: #ff4757;
            color: white;
        }
        .tip {
            color: #777;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">XY.</div>
        <div class="tag">不要为了越狱而放弃升级的乐趣</div>
        <h1>XY's Repo</h1>
        <div class="subtitle">iOS 越狱插件源 · 纯净稳定</div>

        <!-- 这里已经改成无后缀最新地址！！！ -->
        <a class="btn btn-sileo" href="sileo://source/add?url=https://may-20th.github.io/">添加到 Sileo</a>
        <a class="btn btn-zebra" href="zebra://source/add?url=https://may-20th.github.io/">添加到 Zebra</a>

        <div class="tip">— 点击按钮自动唤起包管理器 —</div>
    </div>
</body>
</html>
