name: Update Repo Packages
on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:  # 这里加了手动运行按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev zstd

      - name: Generate Packages
        run: |
          dpkg-scanpackages --multiversion debs /dev/null > Packages
          zstd -f Packages -o Packages.zst

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Packages Packages.zst
          git commit -m "Auto-update Packages and Packages.zst" || echo "No changes to commit"
          git pull origin master
          git push -f origin master
