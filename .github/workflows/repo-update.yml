name: Update Repo Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev zstd

      - name: Update Sections file
        run: echo "Tweaks" > Sections

      - name: Generate Packages
        run: |
          dpkg-scanpackages --multiversion debs /dev/null > Packages.raw
          # 只修改 Section 行，不改变其他任何结构和顺序
          sed 's/^Section:.*/Section: Tweaks/' Packages.raw > Packages
          zstd -f Packages -o Packages.zst
          rm -f Packages.raw

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Packages Packages.zst Sections
          git commit -m "Fix: correct Packages format (no sort)" || echo "No changes"
          git push origin master
