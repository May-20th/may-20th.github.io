name: Update Repo Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev zstd

      - name: Generate correct Packages
        run: |
          # 直接生成标准格式的 Packages
          dpkg-scanpackages --multiversion debs /dev/null > Packages
          # 将所有 Section 行统一改为 Tweaks（注意保留原格式）
          sed -i 's/^Section:.*/Section: Tweaks/' Packages
          # 生成压缩文件
          zstd -f Packages -o Packages.zst

      - name: Update Sections file
        run: echo "Tweaks" > Sections

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Packages Packages.zst Sections
          git commit -m "Fix: regenerate correct Packages format" || echo "No changes"
          git push origin master
